<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PKシュートゲーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #0a2d16 0%, #14532d 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    h1 {
      color: #fff;
      font-size: 1.9rem;
      margin-bottom: 12px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ---- Stats ---- */
    .stats { display: flex; gap: 30px; margin-bottom: 12px; }
    .stat  { text-align: center; color: #fff; }
    .stat-label { font-size: 0.75rem; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-val   { font-size: 2rem; font-weight: bold; line-height: 1.2; }

    /* ---- Kick dots ---- */
    .kick-dots { display: flex; gap: 10px; margin-bottom: 16px; }
    .dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      transition: background 0.3s, border-color 0.3s;
    }
    .dot.scored { background: #4ade80; border-color: #4ade80; }
    .dot.missed { background: #f87171; border-color: #f87171; }

    /* ---- Game area ---- */
    .game {
      position: relative;
      width: 740px; height: 480px;
      background: linear-gradient(180deg, #15803d 0%, #22c55e 50%, #15803d 100%);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    /* Grass stripes */
    .game::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 35px,
        transparent 35px, transparent 70px
      );
      pointer-events: none;
    }

    /* Penalty arc */
    .arc {
      position: absolute;
      bottom: 76px; left: 50%; transform: translateX(-50%);
      width: 240px; height: 120px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top: none;
      border-radius: 0 0 120px 120px;
      pointer-events: none;
    }

    /* Penalty spot */
    .spot {
      position: absolute;
      bottom: 68px; left: 50%; transform: translateX(-50%);
      width: 7px; height: 7px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Goal frame */
    .goal-frame {
      position: absolute;
      top: 20px; left: 170px;
      width: 400px; height: 220px;
      border: 7px solid #e8e8e8;
      border-bottom: none;
      pointer-events: none;
      z-index: 2;
    }

    /* Net pattern */
    .goal-frame::after {
      content: '';
      position: absolute; inset: 0;
      background:
        rgba(0,0,30,0.18),
        repeating-linear-gradient(0deg,  rgba(200,220,255,0.13) 0, rgba(200,220,255,0.13) 1px, transparent 1px, transparent 18px),
        repeating-linear-gradient(90deg, rgba(200,220,255,0.13) 0, rgba(200,220,255,0.13) 1px, transparent 1px, transparent 18px);
    }

    /* Zone grid (clickable) */
    .zones {
      position: absolute;
      top: 20px; left: 170px;
      width: 400px; height: 220px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      z-index: 10;
    }
    .zone { cursor: crosshair; transition: background 0.12s; }
    .zone:hover { background: rgba(255,230,50,0.3); }
    .zone.aimed { background: rgba(255,230,50,0.12); }

    /* ---- Keeper selection zones ---- */
    .keeper-zones {
      position: absolute;
      top: 20px; left: 170px;
      width: 400px; height: 220px;
      display: none;
      grid-template-columns: 1fr 1fr 1fr;
      z-index: 10;
    }
    .keeper-zones.active { display: grid; }
    .kzone {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 2.4rem;
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(100,180,255,0.15);
      transition: background 0.12s, color 0.12s;
    }
    .kzone:hover { background: rgba(59,130,246,0.5); color: #fff; }
    .kzone span {
      font-size: 0.72rem; font-weight: bold;
      letter-spacing: 0.05em; opacity: 0.85;
    }

    /* ---- Side players ---- */
    .side-players {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      top: 265px;
    }
    #teammates { left: 638px; }
    #opponents { left: 18px;  }

    .side-player {
      font-size: 1.6rem;
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .side-player.blue { background: rgba(59,130,246,0.45); border: 2px solid #60a5fa; }
    .side-player.red  { background: rgba(239,68,68,0.45);  border: 2px solid #f87171; }

    @keyframes playerJump {
      0%,100% { transform: translateY(0) scale(1); }
      40%     { transform: translateY(-28px) scale(1.15); }
    }
    .side-player.jump {
      animation: playerJump 0.5s ease forwards;
    }

    /* ---- Save overlay ---- */
    @keyframes saveAnim {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
      50%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -65%) scale(0.9); }
    }
    #save-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.4);
      font-size: 4.5rem; font-weight: bold;
      color: #fff;
      text-shadow: 0 0 24px rgba(59,130,246,0.9), 0 4px 14px rgba(0,0,0,0.6);
      pointer-events: none;
      opacity: 0;
      z-index: 20;
    }
    #save-overlay.show {
      animation: saveAnim 1.1s ease forwards;
    }

    /* Goalkeeper */
    #keeper {
      position: absolute;
      font-size: 4.5rem; line-height: 1;
      z-index: 5;
      transform: translate(-50%, -100%);
    }

    /* Ball */
    #ball {
      position: absolute;
      font-size: 2.2rem; line-height: 1;
      z-index: 8;
      transform: translate(-50%, -50%);
    }

    /* ---- Messages ---- */
    .msg {
      margin-top: 14px;
      font-size: 1.5rem; font-weight: bold;
      color: #fff; min-height: 2rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .msg.goal-msg { color: #fde047; }
    .msg.save-msg { color: #fb923c; }
    .msg.end-msg  { color: #fde047; }

    .sub-msg {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      margin-top: 4px; min-height: 1.2rem;
    }

    .replay-btn {
      margin-top: 12px;
      padding: 10px 36px;
      background: #fde047; color: #1a1a1a;
      border: none; border-radius: 30px;
      font-size: 1rem; font-weight: bold;
      cursor: pointer; display: none;
      transition: background 0.2s, transform 0.1s;
    }
    .replay-btn:hover { background: #facc15; transform: translateY(-2px); }
  </style>
</head>
<body>

<h1>⚽ PKシュートゲーム</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-label">🔵 あなた</div>
    <div class="stat-val" id="s-player">0</div>
  </div>
  <div class="stat" style="color:white;font-size:1.8rem;align-self:center;padding-top:10px;">—</div>
  <div class="stat">
    <div class="stat-label">🔴 相手</div>
    <div class="stat-val" id="s-cpu">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">ラウンド</div>
    <div class="stat-val" id="s-rounds">0 / 5</div>
  </div>
</div>

<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px;">
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="color:rgba(255,255,255,0.6);font-size:0.75rem;width:44px;text-align:right;">あなた</span>
    <div class="kick-dots" id="kick-dots-p"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="color:rgba(255,255,255,0.6);font-size:0.75rem;width:44px;text-align:right;">相手</span>
    <div class="kick-dots" id="kick-dots-c"></div>
  </div>
</div>

<div class="game">
  <div class="goal-frame"></div>
  <div class="zones" id="zones"></div>
  <div class="keeper-zones" id="keeper-zones">
    <div class="kzone" onclick="chooseKeeper('left')">🧤<span>左</span></div>
    <div class="kzone" onclick="chooseKeeper('center')">🧤<span>中央</span></div>
    <div class="kzone" onclick="chooseKeeper('right')">🧤<span>右</span></div>
  </div>
  <div id="keeper">🧤</div>
  <div id="save-overlay">セーブ</div>
  <div class="arc"></div>
  <div class="spot"></div>
  <div id="ball">⚽</div>
  <!-- 仲間（青・右側） -->
  <div class="side-players" id="teammates">
    <div class="side-player blue">🙋</div>
    <div class="side-player blue">🙋</div>
    <div class="side-player blue">🙋</div>
  </div>
  <!-- 相手（赤・左側） -->
  <div class="side-players" id="opponents">
    <div class="side-player red">🙋</div>
    <div class="side-player red">🙋</div>
    <div class="side-player red">🙋</div>
  </div>
</div>

<div class="msg"     id="msg">ゴールをクリックしてシュート！</div>
<div class="sub-msg" id="sub">6つのエリアから狙いを定めろ</div>
<button class="replay-btn" id="replay-btn" onclick="startGame()">もう一度！</button>

<script>
  // ── 定数 ─────────────────────────────────────────────
  const GW = 740, GH = 480;
  const GL = 170, GT = 20, GWIDTH = 400, GHEIGHT = 220;
  const ZW = GWIDTH / 3, ZH = GHEIGHT / 2;

  // ゾーン中心座標（game div 基準ピクセル）
  // 0:左上 1:中上 2:右上 3:左下 4:中下 5:右下
  const ZONE_POS = [];
  for (let row = 0; row < 2; row++)
    for (let col = 0; col < 3; col++)
      ZONE_POS.push({ x: GL + col * ZW + ZW / 2, y: GT + row * ZH + ZH / 2 });

  const KX = { left: GL + ZW / 2, center: GW / 2, right: GL + ZW * 2.5 };
  const KY = GT + GHEIGHT + 2;

  const BALL_X0 = GW / 2, BALL_Y0 = GH - 42;

  // ── ゲーム状態 ───────────────────────────────────────
  let playerGoals = 0, cpuGoals = 0, rounds = 0;
  let phase = 'wait';
  let playerResults = [], cpuResults = [];
  let cpuKickIdx = -1;

  // ── 効果音 ───────────────────────────────────────────
  let audioCtx = null;
  function snd(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const c = audioCtx, t = c.currentTime + 0.05;
    function note(freq, start, dur, waveType, vol) {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = waveType || 'triangle';
      o.frequency.setValueAtTime(freq, t + start);
      g.gain.setValueAtTime(vol || 0.28, t + start);
      g.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
      o.start(t + start); o.stop(t + start + dur);
    }
    if (type === 'goal') {
      [[523,0],[659,0.1],[784,0.2],[1047,0.3]].forEach(([f,s]) => note(f, s, 0.3));
    } else if (type === 'save') {
      note(280, 0,    0.28, 'sawtooth', 0.2);
      note(200, 0.16, 0.25, 'sawtooth', 0.2);
    } else if (type === 'end') {
      [[523,0],[659,0.09],[784,0.18],[1047,0.27],[1319,0.36],[1568,0.45]]
        .forEach(([f,s]) => note(f, s, 0.38));
    } else if (type === 'cheer') {
      function noise(dur) {
        const b = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        return b;
      }
      // 花火3発：[打ち上げ開始, 打ち上げ時間]
      [[0, 0.35], [0.75, 0.30], [1.35, 0.32]].forEach(([startDelay, launchDur]) => {
        const boom = t + startDelay + launchDur;
        // ヒューッ（打ち上げ音：周波数が上昇するサイン波）
        const wh = c.createOscillator(); wh.type = 'sine';
        wh.frequency.setValueAtTime(280, t + startDelay);
        wh.frequency.exponentialRampToValueAtTime(1800, boom);
        const wg = c.createGain();
        wg.gain.setValueAtTime(0.13, t + startDelay);
        wg.gain.exponentialRampToValueAtTime(0.001, boom);
        wh.connect(wg); wg.connect(c.destination);
        wh.start(t + startDelay); wh.stop(boom + 0.01);
        // ドーン（低音爆発：ローパスノイズ、速い減衰）
        const bs = c.createBufferSource(); bs.buffer = noise(1.0);
        const bf = c.createBiquadFilter(); bf.type = 'lowpass'; bf.frequency.value = 140;
        const bg = c.createGain();
        bg.gain.setValueAtTime(1.1, boom);
        bg.gain.exponentialRampToValueAtTime(0.001, boom + 0.55);
        bs.connect(bf); bf.connect(bg); bg.connect(c.destination);
        bs.start(boom); bs.stop(boom + 1.0);
        // パァン（中高音クラック：バンドパスノイズ）
        const cs = c.createBufferSource(); cs.buffer = noise(0.4);
        const cf = c.createBiquadFilter(); cf.type = 'bandpass'; cf.frequency.value = 900; cf.Q.value = 0.5;
        const cg = c.createGain();
        cg.gain.setValueAtTime(0.55, boom);
        cg.gain.exponentialRampToValueAtTime(0.001, boom + 0.22);
        cs.connect(cf); cf.connect(cg); cg.connect(c.destination);
        cs.start(boom); cs.stop(boom + 0.4);
        // パチパチ（高音スパークル：ハイパスノイズ、ゆっくり減衰）
        const ss = c.createBufferSource(); ss.buffer = noise(1.8);
        const sf = c.createBiquadFilter(); sf.type = 'highpass'; sf.frequency.value = 3000;
        const sg = c.createGain();
        sg.gain.setValueAtTime(0.22, boom);
        sg.gain.exponentialRampToValueAtTime(0.001, boom + 1.6);
        ss.connect(sf); sf.connect(sg); sg.connect(c.destination);
        ss.start(boom); ss.stop(boom + 1.8);
      });
    }
  }

  // ── DOM 操作 ─────────────────────────────────────────
  const $ = id => document.getElementById(id);
  function pos(el, x, y) { el.style.left = x + 'px'; el.style.top = y + 'px'; }
  function setMsg(text, cls) { $('msg').textContent = text; $('msg').className = 'msg ' + (cls || ''); }
  function setSub(text)      { $('sub').textContent = text; }

  function celebrate(groupId) {
    document.querySelectorAll('#' + groupId + ' .side-player').forEach((p, i) => {
      setTimeout(() => {
        p.classList.remove('jump');
        void p.offsetWidth;
        p.classList.add('jump');
      }, i * 130);
    });
  }

  function renderDots() {
    ['p', 'c'].forEach(who => {
      const res = who === 'p' ? playerResults : cpuResults;
      const container = $('kick-dots-' + who);
      container.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (res[i] === true ? ' scored' : res[i] === false ? ' missed' : '');
        container.appendChild(d);
      }
    });
  }

  // ── ゾーン生成 ───────────────────────────────────────
  function buildZones() {
    $('zones').innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const z = document.createElement('div');
      z.className = 'zone';
      z.addEventListener('click', () => shoot(i));
      $('zones').appendChild(z);
    }
  }

  // ── ビジュアルリセット ─────────────────────────────
  function resetVisuals(animate) {
    const ball = $('ball'), keeper = $('keeper');
    ball.style.transition = 'none';
    ball.style.fontSize = '2.2rem';
    pos(ball, BALL_X0, BALL_Y0);
    keeper.style.transition = animate ? 'left 0.35s ease, top 0.35s ease, transform 0.35s ease' : 'none';
    pos(keeper, GW / 2, KY);
    keeper.style.transform = 'translate(-50%,-100%)';
    document.querySelectorAll('.zone').forEach(z => z.classList.remove('aimed'));
  }

  function setZones(on) {
    document.querySelectorAll('.zone').forEach(z => z.style.pointerEvents = on ? 'auto' : 'none');
  }

  // ── ゲーム開始 ───────────────────────────────────────
  function startGame() {
    playerGoals = 0; cpuGoals = 0; rounds = 0;
    phase = 'wait'; playerResults = []; cpuResults = []; cpuKickIdx = -1;
    $('s-player').textContent = 0;
    $('s-cpu').textContent = 0;
    $('s-rounds').textContent = '0 / 5';
    $('replay-btn').style.display = 'none';
    $('keeper-zones').classList.remove('active');
    $('zones').style.display = 'grid';
    setMsg('ゴールをクリックしてシュート！');
    setSub('6つのエリアから狙いを定めろ');
    renderDots();
    resetVisuals(false);
    setZones(true);
  }

  // ── キーパーAI（左40%・中20%・右40%） ────────────
  function keeperAI() {
    const r = Math.random();
    return r < 0.4 ? 'left' : r < 0.6 ? 'center' : 'right';
  }

  // ── キーパーダイブ ────────────────────────────────
  function keeperDive(dir) {
    const keeper = $('keeper');
    keeper.style.transition = 'left 0.28s ease-out, top 0.28s ease-out, transform 0.28s ease-out';
    const diveY = dir === 'center' ? KY - 70 : KY - 110;
    pos(keeper, KX[dir], diveY);
    const rot = dir === 'left'  ? 'translate(-50%,-100%) rotate(-45deg)'
              : dir === 'right' ? 'translate(-50%,-100%) rotate(45deg)'
              :                   'translate(-50%,-100%) rotate(0deg)';
    keeper.style.transform = rot;
  }

  // ── ボールをゴールへ飛ばす ────────────────────────
  function shootBall(idx) {
    const ball = $('ball'), tgt = ZONE_POS[idx];
    setTimeout(() => {
      ball.style.transition = 'left 0.38s ease-in, top 0.38s ease-in, font-size 0.36s ease-in';
      pos(ball, tgt.x, tgt.y);
      ball.style.fontSize = '1.2rem';
    }, 30);
  }

  // ── セーブ演出 ────────────────────────────────────
  function showSave() {
    const el = $('save-overlay');
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  // ── セーブ時のボール弾き返し ──────────────────────
  function bounceBall() {
    setTimeout(() => {
      const ball = $('ball');
      const bounceX = 160 + Math.random() * 420;
      ball.style.transition = 'left 0.45s ease-out, top 0.45s ease-out, font-size 0.45s ease-out';
      pos(ball, bounceX, GH - 38);
      ball.style.fontSize = '2.0rem';
    }, 180);
  }

  // ── シュート処理（プレイヤー） ────────────────────
  function shoot(idx) {
    if (phase !== 'wait') return;
    phase = 'playerShoot';
    setZones(false);
    document.querySelectorAll('.zone')[idx].classList.add('aimed');

    const dir = keeperAI();
    const covered = { left: [0,3], center: [1,4], right: [2,5] };
    const isGoal = !covered[dir].includes(idx);

    shootBall(idx);
    setTimeout(() => keeperDive(dir), 80);

    setTimeout(() => {
      playerResults.push(isGoal);
      if (isGoal) {
        playerGoals++;
        snd('goal');
        snd('cheer');
        setMsg('⚽ GOAL!!', 'goal-msg');
        celebrate('teammates');
      } else {
        snd('save');
        setMsg('🧤 SAVED...', 'save-msg');
        celebrate('opponents');
        showSave();
        bounceBall();
      }
      $('s-player').textContent = playerGoals;
      renderDots();
      phase = 'result';

      // 少し待ってからCPUターンへ
      setTimeout(() => {
        resetVisuals(true);
        setMsg('相手のシュート...', '');
        setSub('');
        setTimeout(cpuKick, 800);
      }, 1200);
    }, 480);
  }

  // ── CPU キック準備：プレイヤーがキーパー方向を選ぶ ─
  function cpuKick() {
    phase = 'keeperSelect';
    cpuKickIdx = Math.floor(Math.random() * 6); // CPU が蹴る場所（秘密）
    $('zones').style.display = 'none';
    $('keeper-zones').classList.add('active');
    setMsg('どこで守る？クリックして！', '');
    setSub('キーパーを飛ばす方向を選べ！');
  }

  // ── プレイヤーがキーパー方向を選択 ───────────────
  function chooseKeeper(dir) {
    if (phase !== 'keeperSelect') return;
    phase = 'cpuShoot';
    $('keeper-zones').classList.remove('active');
    $('zones').style.display = 'grid';

    const idx = cpuKickIdx;
    const covered = { left: [0,3], center: [1,4], right: [2,5] };
    const isGoal = !covered[dir].includes(idx);

    document.querySelectorAll('.zone')[idx].classList.add('aimed');
    setSub('');
    shootBall(idx);
    setTimeout(() => keeperDive(dir), 80);

    setTimeout(() => {
      cpuResults.push(isGoal);
      if (isGoal) {
        cpuGoals++;
        snd('save');
        setMsg('🔴 相手ゴール！', 'save-msg');
        celebrate('opponents');
        bounceBall();
      } else {
        snd('goal');
        setMsg('🧤 ナイスセーブ！', 'goal-msg');
        celebrate('teammates');
        showSave();
      }
      $('s-cpu').textContent = cpuGoals;
      rounds++;
      $('s-rounds').textContent = rounds + ' / 5';
      renderDots();
      phase = 'result';

      if (rounds >= 5) {
        setTimeout(endGame, 1100);
      } else {
        setTimeout(() => {
          resetVisuals(true);
          $('zones').style.display = 'grid';
          setMsg('ゴールをクリックしてシュート！');
          setSub('');
          phase = 'wait';
          setZones(true);
        }, 1300);
      }
    }, 480);
  }

  // ── ゲームオーバー ───────────────────────────────────
  function endGame() {
    snd('end');
    let msg;
    if (playerGoals > cpuGoals) {
      msg = `🏆 勝利！ ${playerGoals} - ${cpuGoals} で勝ちました！`;
    } else if (playerGoals < cpuGoals) {
      msg = `😢 敗北... ${playerGoals} - ${cpuGoals} で負けました`;
    } else {
      msg = `🤝 引き分け！ ${playerGoals} - ${cpuGoals}`;
    }
    setMsg(msg, 'end-msg');
    setSub('');
    $('replay-btn').style.display = 'inline-block';
  }

  buildZones();
  startGame();
</script>
</body>
</html>
